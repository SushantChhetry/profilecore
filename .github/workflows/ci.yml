name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.20"
      - run: pnpm install --frozen-lockfile=false
      - run: uv sync --project apps/parser
      - run: pnpm typecheck
      - run: pnpm test
